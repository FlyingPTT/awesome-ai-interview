name: Examples

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  examples:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run examples
        run: bash scripts/test_examples.sh

